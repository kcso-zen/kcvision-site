<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Vision | Bitcoin & ADA Insights</title>
    <style>
        /* 🎨 顏色控制中心 - K C 你可以在這裡改背景色 */
        :root {
            --bg-color: #1a1c2c; /* 深藍色背景，不再是全黑 */
            --card-bg: #2d3436;  /* 鋼鐵灰卡片 */
            --accent: #00d2ff;   /* 天藍色重點 */
            --text: #dfe6e9;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; line-height: 1.6; }
        header { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 80px 20px; text-align: center; }
        
        /* 名字黐埋一齊 */
        h1 { color: #ffffff; font-size: 3.5rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        
        .tagline { color: var(--accent); font-size: 1.2rem; margin-top: 10px; }
        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        .grid { display: grid; gap: 25px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 15px; border-bottom: 4px solid var(--accent); }
        .card h3 { color: var(--accent); margin-top: 0; }
        
        /* 按鈕樣式 */
        .btn-group { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: #000; padding: 8px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .btn:hover { opacity: 0.8; }
        
        footer { text-align: center; padding: 50px; color: #636e72; font-size: 0.8rem; }
        .highlight { color: #fab1a0; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>KCVision</h1>
    <p class="tagline">專注比特幣與 ADA 的數位價值探索</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <h3>🔗 快速連結</h3>
            <div class="btn-group">
                <a href="https://twitter.com/YourXAccount" class="btn">X (Twitter) 帳戶</a>
                <a href="https://ABABNews.com" class="btn">ABAB News</a>
                <a href="#" class="btn">Mago Talk Space</a>
            </div>
        </div>

        <div class="card">
            <h3>📈 核心熱愛：Bitcoin & ADA</h3>
            <p>對於 <span class="highlight">Bitcoin (BTC)</span> 與 <span class="highlight">Cardano (ADA)</span> 擁有極高的熱忱與長期信心。我相信這兩者代表了去中心化未來的技術與價值頂峰。</p>
        </div>

        <div class="card">
            <h3>🎙️ Space Talk & 觀點</h3>
            <p>在數位空間分享對市場的獨到觀察。雖然對隱私幣保持觀察興趣，但目前的戰略重點始終圍繞在主流價值幣的生態建設。</p>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 KCVision.space | 內容純屬個人觀點，不構成投資建議。
</footer>

</body>
</html>
